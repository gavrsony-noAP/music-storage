<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музичне Сховище NoAP</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #1DB954; }
        .container { width: 100%; max-width: 600px; }
        .track-card { background: #181818; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; transition: 0.3s; }
        .track-card:hover { border-color: #1DB954; }
        h3 { margin-top: 0; font-size: 16px; color: #fff; }
        audio { width: 100%; margin-top: 10px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        .link-box { background: #000; padding: 8px; border-radius: 5px; font-size: 12px; margin-top: 10px; word-break: break-all; color: #aaa; border: 1px dashed #444; }
    </style>
</head>
<body>

    <h1>🎧 Lofi Music Library</h1>
    <div class="container" id="playlist">Завантаження треків...</div>

    <script>
        const username = 'gavrsony-noAP';
        const repo = 'music-storage';
        const folder = 'lofi';

        async function loadMusic() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`);
                const files = await response.json();
                const container = document.getElementById('playlist');
                container.innerHTML = '';

                if (!Array.isArray(files)) {
                    container.innerHTML = 'Помилка: Не вдалося знайти папку або файли.';
                    return;
                }

                files.forEach(file => {
                    if(file.name.endsWith('.mp3')) {
                        // Пряме посилання через GitHub Pages
                        const trackUrl = `https://${username}.github.io/${repo}/${folder}/${file.name}`;
                        
                        const card = document.createElement('div');
                        card.className = 'track-card';
                        card.innerHTML = `
                            <h3>🎵 ${file.name}</h3>
                            <audio controls src="${trackUrl}"></audio>
                            <div class="link-box"><strong>Посилання для стріму:</strong><br>${trackUrl}</div>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (e) {
                document.getElementById('playlist').innerHTML = 'Помилка завантаження. Перевірте з’єднання.';
            }
        }
        loadMusic();
    </script>
</body>
</html>
